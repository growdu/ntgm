name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web lint + format + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm exec prettier --check "apps/web/app/**/*.{ts,tsx}" "apps/web/lib/**/*.{ts,tsx}"
      - name: Lint
        run: pnpm --dir apps/web lint
      - name: Typecheck
        run: pnpm --dir apps/web typecheck
      - name: Build
        run: pnpm --dir apps/web build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1

  mobile:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/mobile typecheck

  api:
    name: API typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run python -c "from app.main import app; print('ok')"
      - run: uv run pytest -q
        continue-on-error: true
