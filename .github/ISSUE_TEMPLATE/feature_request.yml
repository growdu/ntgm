name: ✨ 功能请求
description: 提出一个新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述清楚使用场景。

  - type: textarea
    id: problem
    attributes:
      label: 问题
      description: 这个功能要解决什么问题？
      placeholder: |
        当前用户在做 X 时感到困难/不便，
        因为 Y 缺失/不够好。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 你期望的解决方案
      placeholder: |
        增加一个新功能 Z，使得用户可以...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他方案

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 具体的使用场景举例
      placeholder: |
        作为 [角色]，我希望 [功能]，以便 [目的]。
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充说明
      description: 截图、原型图、相关链接等
