services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ntgm
      POSTGRES_PASSWORD: ntgm
      POSTGRES_DB: ntgm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/worker.Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://ntgm:ntgm@postgres:5432/ntgm
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../services/api:/app
      - ../../services/worker:/app

volumes:
  postgres-data:
  minio-data:

