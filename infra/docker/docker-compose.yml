services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16
    environment:
      POSTGRES_USER: ntgm
      POSTGRES_PASSWORD: ntgm
      POSTGRES_DB: ntgm
    ports:
      - "5433:5432"  # host:container — avoid conflict with host postgres on 5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntgm -d ntgm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine  # cached locally
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: docker.m.daocloud.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/ntgm;
      mc anonymous set download local/ntgm 2>/dev/null || true;
      echo 'MinIO bucket ntgm ready';
      "

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8001:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://ntgm:ntgm@postgres:5432/ntgm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: ntgm
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      APP_ENV: development
      PYTHONPATH: /app/api_app:/app/worker_app
      API_APP_PATH: /app/api_app
      DATABASE_URL: postgresql+psycopg://ntgm:ntgm@postgres:5432/ntgm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: ntgm
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_started  # worker needs API code copied in build, not runtime

  # frontend opt-in only — see DEPLOY.md
  frontend:
    profiles: ["never"]
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api/v1

volumes:
  postgres-data:
  minio-data:
