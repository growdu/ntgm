services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ntgm
      POSTGRES_PASSWORD: ntgm
      POSTGRES_DB: ntgm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntgm -d ntgm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/ntgm-dev --ignore-existing;
      mc anonymous set download local/ntgm-dev;
      echo "Bucket ntgm-dev ready";
      exit 0;
      '

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://ntgm:ntgm@postgres:5432/ntgm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ntgm-dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      JWT_SECRET: dev-jwt-secret-change-in-production
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://ntgm:ntgm@postgres:5432/ntgm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ntgm-dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker_app.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  beat:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    command: ["celery", "-A", "worker_app.celery_app", "beat", "--loglevel=INFO"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://ntgm:ntgm@postgres:5432/ntgm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: development
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000')\""]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  minio-data:
